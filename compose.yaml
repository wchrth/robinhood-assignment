version: "3.9"
services:
  web:
    container_name: golang_container
    build: .
    ports:
      - 8080:8080
    depends_on:
      - postgres

  db:
    image: postgres:latest
    container_name: postgres_container
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB_NAME}
    ports:
      - '5432:5432'